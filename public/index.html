<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith's Jian Weather Tower</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* 針對參考圖片高度還原深灰質感 */
            --bg-color: #111111;
            --card-bg: #1A1A1A;
            --header-bg: #111111;
            --text-main: #FFFFFF;
            --text-sub: #A1A1AA;
            --border-color: #2D2D2D;
            --chart-red: #EF4444;
            --chart-green: #22C55E;
            --chart-blue: #3B82F6;
            --chart-orange: #F97316;
            --chart-cyan: #06B6D4;
        }

        * {
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px 20px;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        #main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #update-time-text {
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 500;
        }

        #toggle-view-btn {
            background-color: #2C2C2E;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        #toggle-view-btn:hover {
            background-color: #3A3A3C;
        }

        /* 儀表板樣式 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .card {
            background-color: rgba(20, 24, 30, 0.85);
            /* 稍微增加透明度並帶一點深藍 */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(8px);
            /* 玻璃擬態效果 */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 20px;
            color: #00E5FF;
            /* 採用鮮亮的青藍色作為標題 */
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 20px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        .widget-container {
            width: 110px;
            height: 110px;
            margin-bottom: 15px;
        }

        .main-value {
            font-size: 50px;
            /* 大幅放大數值 */
            font-weight: 800;
            line-height: 1;
            color: #FFFFFF;
            /* 純白高對比 */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .unit {
            font-size: 18px;
            color: #FFFFFF;
            margin-left: 4px;
            vertical-align: baseline;
            opacity: 0.9;
        }

        .sub-value {
            font-size: 14px;
            color: #BBB;
            text-transform: uppercase;
            margin-top: 12px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .sub-value-2 {
            font-size: 14px;
            color: #AAA;
            margin-top: 6px;
            font-weight: 500;
        }

        /* 時序圖新樣式 - 模仿 Weathercloud */
        #history-view {
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            padding-bottom: 40px;
        }

        .chart-section {
            background-color: rgba(22, 22, 24, 0.85);
            /* 與卡片同步透明度 */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 22px;
            width: 100%;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title-main {
            font-size: 20px;
            /* 放大標題對齊卡片 */
            color: #00E5FF;
            /* 採用青藍色 */
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* LIVE 指示燈呼吸動畫 */
        @keyframes pulse-red {
            0% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            70% {
                opacity: 0.6;
                transform: scale(1.1);
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }

            100% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        #carousel-indicator {
            animation: pulse-red 2s infinite;
        }

        .chart-badges {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            background-color: rgba(45, 45, 45, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            /* 放大標籤字體 */
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge-type {
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .badge-val {
            color: white;
            font-weight: 500;
        }

        .badge-drought {
            background-color: #D68910 !important;
            color: white !important;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .history-card {
            height: 300px;
            width: 100%;
        }

        @media (max-width: 992px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .chart-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="app-container">
        <!-- 頂端控制列 -->
        <div id="main-header">
            <div id="update-time-text">等待資料載入中...</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="history-date-picker"
                    style="display: none; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 7px 12px; border-radius: 8px; color-scheme: dark; font-size: 13px; font-weight: 500; cursor: pointer;"
                    onchange="onDateChange()">
                <button id="toggle-view-btn" onclick="toggleView()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="m19 9-5 5-4-4-3 3" />
                    </svg>
                    切換時序圖
                </button>
            </div>
        </div>

        <!-- 儀表板視角 -->
        <div class="dashboard" id="dashboard">
            <!-- Dashboard populated by JS -->
        </div>

        <!-- 輪播式時序圖 (儀表板下方) -->
        <div id="dashboard-carousel" class="chart-section"
            style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
            <div class="chart-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="carousel-indicator"
                        style="width: 8px; height: 8px; border-radius: 50%; background: #E74C3C; display: inline-block;"></span>
                    <h3 class="chart-title-main" id="carousel-title" style="margin: 0;">載入歷史趨勢中...</h3>
                </div>
                <div class="chart-badges" id="carousel-badges"></div>
            </div>
            <div class="history-card" style="height: 350px;">
                <canvas id="chart-carousel"></canvas>
            </div>
        </div>

        <!-- 歷史時序圖視角 -->
        <div id="history-view">
            <!-- 溫度 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">溫度 (°C)</h3>
                    <div class="chart-badges" id="badges-temp"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-temp"></canvas>
                </div>
            </div>

            <!-- 濕度 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">濕度 (%)</h3>
                    <div class="chart-badges" id="badges-humidity"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-humidity"></canvas>
                </div>
            </div>

            <!-- 風速 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">風速 (m/s)</h3>
                    <div class="chart-badges" id="badges-windspeed"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-wind-speed"></canvas>
                </div>
            </div>

            <!-- 風向 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">風向 (°)</h3>
                    <div class="chart-badges" id="badges-winddir"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-wind-dir"></canvas>
                </div>
            </div>

            <!-- 氣壓 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">大氣壓力 (hPa)</h3>
                    <div class="chart-badges" id="badges-pressure"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-pressure"></canvas>
                </div>
            </div>

            <!-- 降雨 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">降雨量 (mm)</h3>
                    <div class="chart-badges" id="badges-precip"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-precip"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/weather/latest';

        function getWindDirection(degree) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.floor((degree + 11.25) / 22.5) % 16;
            return directions[index];
        }

        /* 1. 溫度: 漸層彩色圓弧儀表板 (SVG 內建多段路徑實作) */
        function buildSVGTempGauge(temp) {
            const minT = -10; const maxT = 40;
            let percent = (temp - minT) / (maxT - minT);
            if (percent < 0) percent = 0; if (percent > 1) percent = 1;
            const angle = -135 + (percent * 270);

            // 為了讓漸層完美順著圓弧，且不在各個瀏覽器上破圖
            // 最穩定的做法是將圓弧拆成兩半：左半邊(冷色系) & 右半邊(暖色系)
            // 並各自使用直向/橫向的線性漸層來黏合，視覺上就會像是順著圓弧變色
            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));">
                <defs>
                    <!-- 左半邊：由下(深藍) 到 上(亮綠) -->
                    <linearGradient id="coolGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#145A6E" />  <!-- 深青/藍 -->
                        <stop offset="20%" stop-color="#8CD0E3" /> <!-- 淺藍 -->
                        <stop offset="60%" stop-color="#1A8A4D" /> <!-- 深綠 -->
                        <stop offset="100%" stop-color="#84C665" /> <!-- 亮綠 -->
                    </linearGradient>
                    <!-- 右半邊：由上(橘黃) 到 下(紫紅) -->
                    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#FCE182" />   <!-- 鵝黃 -->
                        <stop offset="30%" stop-color="#F28E19" />  <!-- 橘色 -->
                        <stop offset="60%" stop-color="#DE1A2C" />  <!-- 紅色 -->
                        <stop offset="100%" stop-color="#702282" /> <!-- 紫色 -->
                    </linearGradient>
                </defs>
                
                <!-- 底部暗黑背景圓弧 -->
                <path d="M 22 75 A 38 38 0 1 1 78 75" fill="none" stroke="#222" stroke-width="16" stroke-linecap="round" />
                
                <!-- 左半邊溫度軌道 (使用 stroke-dasharray 切割一半) -->
                <!-- 圓半徑 r=38, 圓周長為 238.76, 1/2 圓弧長度大概是 119 -->
                <path d="M 22 75 A 38 38 0 0 1 50 12" fill="none" stroke="url(#coolGrad)" stroke-width="16" stroke-linecap="round" />
                
                <!-- 右半邊溫度軌道 -->
                <path d="M 50 12 A 38 38 0 0 1 78 75" fill="none" stroke="url(#warmGrad)" stroke-width="16" stroke-linecap="round" />
                
                <!-- 白色指針 -->
                <g transform="translate(50, 50) rotate(${angle})">
                    <line x1="0" y1="0" x2="0" y2="-28" stroke="#FFF" stroke-width="4.5" stroke-linecap="round"/>
                    <circle cx="0" cy="0" r="7" fill="#FFF"/>
                </g>
            </svg>
            `;
        }

        /* 2. 露點: 藍色漸層水滴 */
        function buildSVGDewPoint() {
            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));">
                <defs>
                    <linearGradient id="dropGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#38BDF8" />
                        <stop offset="100%" stop-color="#0284C7" />
                    </linearGradient>
                </defs>
                <path d="M50 15 C 50 15, 20 50, 20 70 A 30 30 0 0 0 80 70 C 80 50, 50 15, 50 15 Z" fill="url(#dropGradient)" />
                <circle cx="50" cy="70" r="14" fill="#7DD3FC" opacity="0.4"/>
            </svg>
            `;
        }

        /* 3. 濕度: 雷達掃描圓餅 */
        function buildSVGHumidity(hum) {
            const radius = 38;
            const circum = 2 * Math.PI * radius;
            const dash = (hum / 100) * circum;
            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%; transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));">
                <!-- 底部暗灰圈 -->
                <circle cx="50" cy="50" r="${radius}" fill="#455A64" opacity="0.3" />
                <!-- 藍色環形 (依據濕度填滿) -->
                <circle cx="50" cy="50" r="${radius}" fill="none" stroke="#0EA5E9" stroke-width="24" stroke-dasharray="${dash} ${circum}" opacity="0.85" />
                <!-- 內部深色圓 -->
                <circle cx="50" cy="50" r="26" fill="var(--card-bg)" />
            </svg>
            `;
        }

        /* 4. 風向風速: 具羅盤刻度的動態圓盤 */
        function buildSVGWind(dir) {
            let ticks = '';
            for (let i = 0; i < 360; i += 5) {
                const isMajor = i % 90 === 0;
                const len = isMajor ? 5 : 2;
                ticks += `<line x1="50" y1="8" x2="50" y2="${8 + len}" stroke="${isMajor ? '#FFF' : '#666'}" stroke-width="${isMajor ? 2 : 1}" transform="rotate(${i} 50 50)" />`;
            }
            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                ${ticks}
                <!-- 羅盤文字 -->
                <text x="50" y="24" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">N</text>
                <text x="50" y="83" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">S</text>
                <text x="22" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">W</text>
                <text x="78" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">E</text>
                
                <!-- 動態風向箭頭 -->
                <g transform="translate(50,50) rotate(${dir})">
                    <polygon points="-5,-30 5,-30 0,-42" fill="#FFF" />
                </g>
            </svg>
            `;
        }

        /* 5. 降雨: 立體網狀量筒 */
        function buildSVGPrecip(precip) {
            // 抓取最大裝水量，假設 50mm 為滿
            let percent = precip / 50; if (percent > 1) percent = 1;
            const h = 50 * percent;
            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));">
                <!-- 圓柱頂部開口 -->
                <ellipse cx="50" cy="25" rx="20" ry="6" fill="none" stroke="#666" stroke-width="2"/>
                <!-- 圓柱邊緣與底座 -->
                <path d="M 30 25 L 30 75 A 20 6 0 0 0 70 75 L 70 25" fill="none" stroke="#666" stroke-width="2"/>
                
                <!-- 若有降水則以藍色填充高度 -->
                ${h > 0 ? `<path d="M 30 ${75 - h} L 30 75 A 20 6 0 0 0 70 75 L 70 ${75 - h} A 20 6 0 0 1 30 ${75 - h}" fill="#38BDF8" opacity="0.6"/>` : ''}
            </svg>
            `;
        }

        /* 6. 氣壓: 小時鐘般的指針類比刻度 */
        function buildSVGPressure(press) {
            // 將 950 ~ 1050 的氣壓範圍映射到羅盤的 270 度
            const minP = 950; const maxP = 1050;
            let percent = (press - minP) / (maxP - minP);
            if (percent < 0) percent = 0; if (percent > 1) percent = 1;
            const angle = -135 + (percent * 270);

            let ticks = '';
            for (let i = 0; i <= 100; i += 2) {
                const a = -135 + (i * 2.7);
                const isMajor = i % 10 === 0;
                const len = isMajor ? 6 : 3;
                ticks += `<line x1="50" y1="12" x2="50" y2="${12 + len}" stroke="${isMajor ? '#CCC' : '#666'}" stroke-width="${isMajor ? 2 : 1}" transform="rotate(${a} 50 50)" />`;
            }

            return `
            <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                <!-- 氣壓計邊框 -->
                <circle cx="50" cy="50" r="42" fill="#3A3A3C" stroke="#222" stroke-width="2"/>
                <!-- 白色圓盤 -->
                <circle cx="50" cy="50" r="38" fill="#F4F4F5"/>
                ${ticks}
                
                <!-- 羅盤數字 -->
                <g fill="#111" font-size="5" text-anchor="middle" font-weight="bold">
                    <text x="50" y="27" transform="rotate(-90 50 50)">950</text>
                    <text x="50" y="27" transform="rotate(-40 50 50)">982</text>
                    <text x="50" y="27" transform="rotate(10 50 50)">1013</text>
                    <text x="50" y="27" transform="rotate(60 50 50)">1040</text>
                </g>

                <!-- 紅色指針 -->
                <g transform="translate(50, 50) rotate(${angle})">
                    <line x1="0" y1="0" x2="0" y2="-28" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="0" cy="0" r="4.5" fill="#EF4444"/>
                    <circle cx="0" cy="-20" r="2" fill="#FFF"/> <!-- 紅色指針上的白光澤點 -->
                </g>
                <circle cx="50" cy="50" r="1.5" fill="#000"/>
            </svg>
            `;
        }

        async function fetchWeatherData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const obs = data.observations[0];
                const metric = obs.metric;

                // 風向風速處理
                const reversedWindDir = (obs.winddir + 180) % 360;
                const windSpeedKmh = metric.windSpeed;
                const windGustKmh = metric.windGust;
                // 注意：參考圖片風速使用的是 kph (km/h)，因使用者先前要求 m/s，這裡我們維持 m/s
                const windSpeedMsNum = metric.windSpeed / 3.6;
                const windGustMsNum = metric.windGust / 3.6;

                const dashboard = document.getElementById('dashboard');

                // 生產 HTML (6卡片)
                dashboard.innerHTML = `
                    <div class="card">
                        <div class="card-title">目前溫度</div>
                        <div class="widget-container">
                            ${buildSVGTempGauge(metric.temp)}
                        </div>
                        <div class="value-box">
                            <span class="main-value">${metric.temp}</span><span class="unit">°C</span>
                            <div class="sub-value">TEMPERATURE</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">露點溫度</div>
                        <div class="widget-container">
                            ${buildSVGDewPoint()}
                        </div>
                        <div class="value-box">
                            <span class="main-value">${metric.dewpt}</span><span class="unit">°C</span>
                            <div class="sub-value">DEW POINT</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">相對濕度</div>
                        <div class="widget-container">
                            ${buildSVGHumidity(obs.humidity)}
                        </div>
                        <div class="value-box">
                            <span class="main-value">${obs.humidity}</span><span class="unit">%</span>
                            <div class="sub-value">HUMIDITY</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">風向風速</div>
                        <div class="widget-container">
                            ${buildSVGWind(reversedWindDir)}
                        </div>
                        <div class="value-box">
                            <span class="main-value">${windSpeedMsNum.toFixed(1)}</span><span class="unit">m/s</span>
                            <div class="sub-value">GUST ${windGustMsNum.toFixed(1)} m/s</div>
                            <div class="sub-value-2">${reversedWindDir}° ${getWindDirection(reversedWindDir)}</div>

                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">日降雨量</div>

                            ${buildSVGPrecip(metric.precipTotal)}

                            <span class="main-value">${metric.precipTotal.toFixed(1)}</span><span class="unit">mm</span>

                    </div>
                    
                    <div class="card">
                        <div class="card-title">大氣壓力</div>

                `;

            } catch (error) {

                document.getElementById('dashboard').innerHTML = '<div style="color:white;text-align:center;width:100%;grid-column: 1/-1;">無法載入資料，請確認後端伺服器已啟動。</div>';
            }
        }

        function init() {
            // OBS 專用邏輯
            const params = new URLSearchParams(window.location.search);
            if (params.get('obs') === 'true') {
                document.getElementById('main-header').style.display = 'none';
                document.getElementById('dashboard-carousel').style.borderTop = 'none';
                document.getElementById('dashboard-carousel').style.marginTop = '15px';
                document.body.style.background = 'transparent';
                document.getElementById('app-container').style.padding = '0';
            }

            fetchWeatherData();
            fetchHistoryData(); // 同時抓取歷史資料供輪播使用
            setInterval(fetchWeatherData, 60000);
        }

        init();

        // ----------------------------------------------------
        // 時序圖相關邏輯
        // ----------------------------------------------------
        let isHistoryView = false;
        let charts = {};

        // 初始化日期選擇器為今天
        const datePicker = document.getElementById('history-date-picker');
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;

        function onDateChange() {
            fetchHistoryData(datePicker.value);
        }

        function toggleView() {
            const dashboard = document.getElementById('dashboard');
            const carousel = document.getElementById('dashboard-carousel');
            const historyView = document.getElementById('history-view');
            const toggleBtn = document.getElementById('toggle-view-btn');

            isHistoryView = !isHistoryView;

            if (isHistoryView) {
                dashboard.style.display = 'none';
                carousel.style.display = 'none';
                historyView.style.display = 'flex';
                datePicker.style.display = 'block';
                toggleBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 返回儀表板';
                fetchHistoryData(datePicker.value);
            } else {
                dashboard.style.display = 'grid';
                carousel.style.display = 'block';
                historyView.style.display = 'none';
                datePicker.style.display = 'none';
                toggleBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> 切換時序圖';
                // 返回儀表板時，自動重置一次輪播資料，維持同步
                fetchHistoryData();
            }
        }

        async function fetchHistoryData(dateStr) {
            try {
                // 加入快取破壞參數 (Cache Buster) 避免瀏覽器回傳舊資料
                const t = Date.now();
                const url = dateStr ? `/api/weather/history?date=${dateStr}&t=${t}` : `/api/weather/history?t=${t}`;
                console.log(`[Frontend] Fetching history from: ${url}`);
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    renderCharts(data);
                } else {
                    alert(`選取的日期 (${dateStr}) 沒有觀測紀錄。`);
                }
            } catch (error) {
                console.error('取得時序圖資料失敗:', error);
            }
        }

        // 資料處理：計算滑動窗口統計量，模擬 Min/Avg/Max 線條
        function getWindowStats(data, field, windowSize = 10) {
            let mins = [], maxs = [], avgs = [];
            for (let i = 0; i < data.length; i++) {
                let start = Math.max(0, i - Math.floor(windowSize / 2));
                let end = Math.min(data.length, i + Math.floor(windowSize / 2) + 1);
                let windowData = data.slice(start, end).map(d => d[field]).filter(v => v != null);

                if (windowData.length > 0) {
                    mins.push(Math.min(...windowData));
                    maxs.push(Math.max(...windowData));
                    avgs.push(windowData.reduce((a, b) => a + b, 0) / windowData.length);
                } else {
                    mins.push(null); maxs.push(null); avgs.push(null);
                }
            }
            return { mins, maxs, avgs };
        }

        // 建立 Badge HTML
        function createBadges(stats, unit, containerId, colors) {
            const container = document.getElementById(containerId);
            const avg = stats.avgs.reduce((a, b) => a + (b || 0), 0) / stats.avgs.filter(v => v != null).length;
            const min = Math.min(...stats.mins.filter(v => v != null));
            const max = Math.max(...stats.maxs.filter(v => v != null));

            let html = `
                <div class="badge"><span class="badge-type" style="background:${colors.min}">Min</span> <span class="badge-val">${min.toFixed(1)} ${unit}</span></div>
                <div class="badge"><span class="badge-type" style="background:${colors.avg}">Avg</span> <span class="badge-val">${avg.toFixed(1)} ${unit}</span></div>
                <div class="badge"><span class="badge-type" style="background:${colors.max}">Max</span> <span class="badge-val">${max.toFixed(1)} ${unit}</span></div>
            `;

            // 特殊處理：如果有 Gust
            if (stats.gusts && colors.gust) {
                const maxGust = Math.max(...stats.gusts.filter(v => v != null));
                const badgeHtml = `<div class="badge"><span class="badge-type" style="background:${colors.gust}">Gust</span> <span class="badge-val">${maxGust.toFixed(1)} ${unit}</span></div>`;
                html += badgeHtml;
            }

            // 特殊處理：如果有 Dewpoint
            if (stats.dewpts && colors.dewpt) {
                const avgDew = stats.dewpts.reduce((a, b) => a + (b || 0), 0) / stats.dewpts.filter(v => v != null).length;
                const badgeHtml = `<div class="badge"><span class="badge-type" style="background:${colors.dewpt}">Dewpt</span> <span class="badge-val">${avgDew.toFixed(1)} ${unit}</span></div>`;
                html += badgeHtml;
            }

            container.innerHTML = html;
        }

        // Chart.js 共用設定
        Chart.defaults.color = '#FFFFFF';
        Chart.defaults.font.family = "'Roboto', sans-serif";
        Chart.defaults.font.size = 14;
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            elements: {
                point: { radius: 0 },
                line: { tension: 0.4, borderWidth: 4 } // 加粗平均線 (Avg) 到 4
            },
            scales: {
                x: {
                    grid: { display: false, drawBorder: false },
                    ticks: {
                        color: '#FFFFFF',
                        maxRotation: 0,
                        autoSkip: false,
                        padding: 10,
                        callback: function (val, index) {
                            const label = this.getLabelForValue(val);
                            if (label.endsWith(':00')) return label.split(':')[0];
                            return '';
                        }
                    }
                },
                y: {
                    grid: { color: 'rgba(255, 255, 255, 0.1)', drawBorder: false },
                    ticks: { color: '#FFFFFF', padding: 10 }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { mode: 'index', intersect: false }
            }
        };

        // --- Carousel Logic ---
        let carouselIndex = 0;
        let carouselIntervalId = null;
        let lastHistoryData = [];

        function startCarousel(data) {
            lastHistoryData = data;
            if (carouselIntervalId) clearInterval(carouselIntervalId);

            // 立即執行第一次
            renderSingleCarousel();

            // 每 5 秒切換
            carouselIntervalId = setInterval(() => {
                carouselIndex = (carouselIndex + 1) % 6;
                renderSingleCarousel();
            }, 5000);
        }

        function renderSingleCarousel() {
            if (!lastHistoryData.length) return;
            const data = lastHistoryData;
            const titleEl = document.getElementById('carousel-title');
            const badgesEl = document.getElementById('carousel-badges');
            const ctx = document.getElementById('chart-carousel').getContext('2d');

            if (charts.carousel) charts.carousel.destroy();

            const labels = data.map(d => {
                const date = new Date(d.created_at);
                return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            });

            switch (carouselIndex) {
                case 0: // Temperature
                    titleEl.innerText = '溫度 (°C)';
                    const tempStats = getWindowStats(data, 'temp', 15);
                    const dewpts = data.map(d => d.dewpt);
                    createBadges({ ...tempStats, dewpts }, '°C', 'carousel-badges', { min: '#C0392B', avg: '#E74C3C', max: '#7B241C', dewpt: '#1ABC9C' });
                    charts.carousel = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Min', data: tempStats.mins, borderColor: '#C0392B', borderWidth: 1, fill: false, tension: 0.4 },
                                { label: 'Avg', data: tempStats.avgs, borderColor: '#E74C3C', borderWidth: 3, fill: false, tension: 0.4 },
                                { label: 'Max', data: tempStats.maxs, borderColor: '#7B241C', borderWidth: 1, fill: false, tension: 0.4 },
                                { label: 'Dewpoint', data: data.map(d => d.dewpt), borderColor: '#1ABC9C', borderWidth: 1, fill: false, tension: 0.4 }
                            ]
                        },
                        options: commonOptions
                    });
                    break;
                case 1: // Humidity
                    titleEl.innerText = '濕度 (%)';
                    const humStats = getWindowStats(data, 'humidity', 15);
                    createBadges(humStats, '%', 'carousel-badges', { min: '#1F618D', avg: '#2980B9', max: '#1B4F72' });
                    charts.carousel = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Min', data: humStats.mins, borderColor: '#1F618D', borderWidth: 1, fill: false, tension: 0.4 },
                                { label: 'Avg', data: humStats.avgs, borderColor: '#2980B9', borderWidth: 3, fill: false, tension: 0.4 },
                                { label: 'Max', data: humStats.maxs, borderColor: '#1B4F72', borderWidth: 1, fill: false, tension: 0.4 }
                            ]
                        },
                        options: commonOptions
                    });
                    break;
                case 2: // Wind Speed
                    titleEl.innerText = '風速 (m/s)';
                    const windStats = getWindowStats(data, 'wind_speed', 15);
                    const processedWind = {
                        mins: windStats.mins.map(v => v / 3.6),
                        maxs: windStats.maxs.map(v => v / 3.6),
                        avgs: windStats.avgs.map(v => v / 3.6),
                        gusts: data.map(d => d.wind_gust / 3.6)
                    };
                    createBadges(processedWind, 'm/s', 'carousel-badges', { min: '#117864', avg: '#1ABC9C', max: '#0E6251', gust: '#D35400' });
                    charts.carousel = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Min', data: processedWind.mins, borderColor: '#117864', borderWidth: 1, tension: 0.4 },
                                { label: 'Avg', data: processedWind.avgs, borderColor: '#1ABC9C', borderWidth: 3, tension: 0.4 },
                                { label: 'Max', data: processedWind.maxs, borderColor: '#0E6251', borderWidth: 1, tension: 0.4 },
                                { label: 'Gust', data: processedWind.gusts, backgroundColor: '#D35400', pointRadius: 3, showLine: false, pointStyle: 'circle' }
                            ]
                        },
                        options: commonOptions
                    });
                    break;
                case 3: // Wind Direction
                    titleEl.innerText = '風向 (°)';
                    const windDirs = data.map(d => (d.wind_dir + 180) % 360);
                    const avgDir = windDirs.reduce((a, b) => a + (b || 0), 0) / windDirs.filter(v => v != null).length;
                    badgesEl.innerHTML = `<div class="badge"><span class="badge-type" style="background:#2E86C1">Avg</span> <span class="badge-val">${avgDir.toFixed(0)}° (${getWindDirection(avgDir)})</span></div>`;
                    charts.carousel = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Direction',
                                data: windDirs,
                                backgroundColor: '#2E86C1',
                                pointRadius: 2,
                                showLine: false,
                                pointStyle: 'circle'
                            }]
                        },
                        options: {
                            ...commonOptions,
                            scales: {
                                ...commonOptions.scales,
                                y: {
                                    min: 0, max: 360,
                                    ticks: {
                                        stepSize: 45,
                                        callback: (v) => v + '°'
                                    }
                                }
                            }
                        }
                    });
                    break;
                case 4: // Pressure
                    titleEl.innerText = '大氣壓力 (hPa)';
                    const pressStats = getWindowStats(data, 'pressure', 15);
                    createBadges(pressStats, 'hPa', 'carousel-badges', { min: '#7D3C98', avg: '#AF7AC5', max: '#4A235A' });
                    charts.carousel = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Min', data: pressStats.mins, borderColor: '#7D3C98', borderWidth: 1, tension: 0.4 },
                                { label: 'Avg', data: pressStats.avgs, borderColor: '#AF7AC5', borderWidth: 3, tension: 0.4 },
                                { label: 'Max', data: pressStats.maxs, borderColor: '#4A235A', borderWidth: 1, tension: 0.4 }
                            ]
                        },
                        options: commonOptions
                    });
                    break;
                case 5: // Precipitation
                    titleEl.innerText = '降雨量 (mm)';
                    const totalRain = data.length > 0 ? data[data.length - 1].precip_total : 0;
                    const maxRainDaily = Math.max(...data.map(d => d.precip_total));
                    let hourlyData = new Array(labels.length).fill(0);
                    for (let i = 1; i < data.length; i++) {
                        const diff = Math.max(0, data[i].precip_total - data[i - 1].precip_total);
                        if (diff > 0) hourlyData[i] = diff;
                    }
                    badgesEl.innerHTML = `
                        <div class="badge"><span class="badge-type" style="background:#2E86C1">Total</span> <span class="badge-val">${totalRain.toFixed(1)} mm</span></div>
                        <div class="badge"><span class="badge-type" style="background:#1B4F72">Max</span> <span class="badge-val">${maxRainDaily.toFixed(1)} mm</span></div>
                    `;
                    charts.carousel = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{ label: 'Total', data: hourlyData, backgroundColor: '#2E86C1', borderRadius: 2, barPercentage: 1.0, categoryPercentage: 1.0 }]
                        },
                        options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, beginAtZero: true, suggestedMax: 1.0 } } }
                    });
                    break;
            }
        }

        function renderCharts(data) {
            startCarousel(data);
            const labels = data.map(d => {
                const date = new Date(d.created_at);
                return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            });

            // 1. 溫度 - 三條線 (Min, Avg, Max)
            const tempStats = getWindowStats(data, 'temp', 15);
            const dewpts = data.map(d => d.dewpt);
            createBadges({ ...tempStats, dewpts }, '°C', 'badges-temp', { min: '#C0392B', avg: '#E74C3C', max: '#7B241C', dewpt: '#1ABC9C' });

            const ctxTemp = document.getElementById('chart-temp').getContext('2d');
            if (charts.temp) charts.temp.destroy();
            charts.temp = new Chart(ctxTemp, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Min', data: tempStats.mins, borderColor: '#C0392B', borderWidth: 1, fill: false, tension: 0.4 },
                        { label: 'Avg', data: tempStats.avgs, borderColor: '#E74C3C', borderWidth: 3, fill: false, tension: 0.4 },
                        { label: 'Max', data: tempStats.maxs, borderColor: '#7B241C', borderWidth: 1, fill: false, tension: 0.4 },
                        { label: 'Dewpoint', data: data.map(d => d.dewpt), borderColor: '#1ABC9C', borderWidth: 1, fill: false, tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // 2. 濕度 - 三條線
            const humStats = getWindowStats(data, 'humidity', 15);
            createBadges(humStats, '%', 'badges-humidity', { min: '#1F618D', avg: '#2980B9', max: '#1B4F72' });

            const ctxHum = document.getElementById('chart-humidity').getContext('2d');
            if (charts.humidity) charts.humidity.destroy();
            charts.humidity = new Chart(ctxHum, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Min', data: humStats.mins, borderColor: '#1F618D', borderWidth: 1, fill: false, tension: 0.4 },
                        { label: 'Avg', data: humStats.avgs, borderColor: '#2980B9', borderWidth: 3, fill: false, tension: 0.4 },
                        { label: 'Max', data: humStats.maxs, borderColor: '#1B4F72', borderWidth: 1, fill: false, tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // 3. 風速
            const windStats = getWindowStats(data, 'wind_speed', 15);
            // 修正：IBM API 提供的 precip_rate 本身已是 metric
            // 風速單位轉換：若是需要加強讀數，這裡統一處理
            const processedWindSpeeds = {
                mins: windStats.mins.map(v => v / 3.6),
                maxs: windStats.maxs.map(v => v / 3.6),
                avgs: windStats.avgs.map(v => v / 3.6),
                gusts: data.map(d => d.wind_gust / 3.6)
            };
            createBadges(processedWindSpeeds, 'm/s', 'badges-windspeed', { min: '#117864', avg: '#1ABC9C', max: '#0E6251', gust: '#D35400' });

            const ctxWind = document.getElementById('chart-wind-speed').getContext('2d');
            if (charts.windSpeed) charts.windSpeed.destroy();
            charts.windSpeed = new Chart(ctxWind, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Min', data: processedWindSpeeds.mins, borderColor: '#117864', borderWidth: 1, tension: 0.4 },
                        { label: 'Avg', data: processedWindSpeeds.avgs, borderColor: '#1ABC9C', borderWidth: 3, tension: 0.4 },
                        { label: 'Max', data: processedWindSpeeds.maxs, borderColor: '#0E6251', borderWidth: 1, tension: 0.4 },
                        {
                            label: 'Gust',
                            data: processedWindSpeeds.gusts,
                            backgroundColor: '#D35400',
                            pointRadius: 3,
                            showLine: false,
                            pointStyle: 'circle'
                        }
                    ]
                },
                options: commonOptions
            });

            // 4. 風向 - 散佈圖 + 側邊 Y 軸
            const windDirs = data.map(d => (d.wind_dir + 180) % 360);
            const avgDir = windDirs.reduce((a, b) => a + (b || 0), 0) / windDirs.filter(v => v != null).length;
            document.getElementById('badges-winddir').innerHTML = `<div class="badge"><span class="badge-type" style="background:#2E86C1">Avg</span> <span class="badge-val">${avgDir.toFixed(0)}° (${getWindDirection(avgDir)})</span></div>`;

            const ctxWindDir = document.getElementById('chart-wind-dir').getContext('2d');
            if (charts.windDir) charts.windDir.destroy();
            charts.windDir = new Chart(ctxWindDir, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Direction',
                        data: windDirs,
                        backgroundColor: '#2E86C1',
                        pointRadius: 2,
                        showLine: false,
                        pointStyle: 'circle'
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            min: 0, max: 360,
                            ticks: {
                                stepSize: 45,
                                callback: (v) => v + '°'
                            }
                        },
                        y2: {
                            position: 'right',
                            min: 0, max: 360,
                            ticks: {
                                stepSize: 45,
                                callback: (v) => {
                                    const labels = { 0: 'N', 45: 'NE', 90: 'E', 135: 'SE', 180: 'S', 225: 'SW', 270: 'W', 315: 'NW', 360: 'N' };
                                    return labels[v] || '';
                                }
                            },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });

            // 5. 氣壓
            const pressStats = getWindowStats(data, 'pressure', 15);
            createBadges(pressStats, 'hPa', 'badges-pressure', { min: '#7D3C98', avg: '#AF7AC5', max: '#4A235A' });

            const ctxPress = document.getElementById('chart-pressure').getContext('2d');
            if (charts.pressure) charts.pressure.destroy();
            charts.pressure = new Chart(ctxPress, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Min', data: pressStats.mins, borderColor: '#7D3C98', borderWidth: 1, tension: 0.4 },
                        { label: 'Avg', data: pressStats.avgs, borderColor: '#AF7AC5', borderWidth: 3, tension: 0.4 },
                        { label: 'Max', data: pressStats.maxs, borderColor: '#4A235A', borderWidth: 1, tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // 6. 降雨 - 改為 Bar 形式
            const totalRain = data.length > 0 ? data[data.length - 1].precip_total : 0;
            const maxRainDaily = Math.max(...data.map(d => d.precip_total));
            const hasRain = totalRain > 0;

            // 計算小時降雨 (為了顯示 Bar)
            let hourlyData = new Array(labels.length).fill(0);
            for (let i = 1; i < data.length; i++) {
                const diff = Math.max(0, data[i].precip_total - data[i - 1].precip_total);
                if (diff > 0) hourlyData[i] = diff;
            }

            const badgesPrecip = document.getElementById('badges-precip');
            badgesPrecip.innerHTML = `
                <div class="badge"><span class="badge-type" style="background:#2E86C1">Total</span> <span class="badge-val">${totalRain.toFixed(1)} mm</span></div>
                <div class="badge"><span class="badge-type" style="background:#1B4F72">Max</span> <span class="badge-val">${maxRainDaily.toFixed(1)} mm</span></div>
            `;

            const ctxPrecip = document.getElementById('chart-precip').getContext('2d');
            if (charts.precip) charts.precip.destroy();
            charts.precip = new Chart(ctxPrecip, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total',
                        data: hourlyData,
                        backgroundColor: '#2E86C1',
                        borderRadius: 2,
                        barPercentage: 1.0,
                        categoryPercentage: 1.0
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            ...commonOptions.scales.y,
                            beginAtZero: true,
                            suggestedMax: 1.0
                        }
                    }
                }
            });
        }

    </script>
</body>
