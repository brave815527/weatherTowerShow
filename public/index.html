<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith's Jian Weather Tower</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- 引入樣式表 (包含玻璃擬態與骨架屏動畫) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-container">
        <!-- 頂端控制列 -->
        <div id="main-header">
            <div id="update-time-text">等待資料載入中...</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="history-date-picker"
                    style="display: none; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 7px 12px; border-radius: 8px; color-scheme: dark; font-size: 13px; font-weight: 500; cursor: pointer;"
                    onchange="onDateChange()">
                <button id="toggle-premium-btn" onclick="togglePremiumView()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    高級儀表
                </button>
                <button id="toggle-view-btn" onclick="toggleView()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="m19 9-5 5-4-4-3 3"/>
                    </svg>
                    切換時序圖
                </button>
            </div>
        </div>

        <!-- 儀表板視角 (內建骨架屏載入動畫) -->
        <div class="dashboard" id="dashboard">
            <!-- 溫度骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
            </div>
            <!-- 露點溫度骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
            </div>
            <!-- 濕度骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
            </div>
            <!-- 風速風向骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
                <div class="skeleton skeleton-sub2"></div>
            </div>
            <!-- 累積降雨骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
                <div class="skeleton skeleton-sub2"></div>
            </div>
            <!-- 大氣壓力骨架屏 -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="widget-container">
                    <div class="skeleton skeleton-gauge"></div>
                </div>
                <div class="skeleton skeleton-value"></div>
                <div class="skeleton skeleton-sub" style="margin-top: 12px;"></div>
            </div>
        </div>

        <!-- 進階儀表板視角 (內建骨架屏載入動畫) -->
        <div id="premium-dashboard" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;">
            <!-- 6個高級表盤骨架屏 -->
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
            <div class="premium-card">
                <div class="premium-gauge-container">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%;">
                        <div class="skeleton skeleton-gauge" style="width: 80px; height: 80px; margin-bottom: 10px;"></div>
                        <div class="skeleton skeleton-value" style="width: 50%; height: 24px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 輪播式時序圖 (儀表板下方) -->
        <div id="dashboard-carousel" class="chart-section"
            style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
            <div class="chart-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="carousel-indicator"
                        style="width: 8px; height: 8px; border-radius: 50%; background: #E74C3C; display: inline-block;"></span>
                    <h3 class="chart-title-main" id="carousel-title" style="margin: 0;">載入歷史趨勢中...</h3>
                </div>
                <div class="chart-badges" id="carousel-badges"></div>
            </div>
            <div class="history-card" style="height: 350px;">
                <canvas id="chart-carousel"></canvas>
            </div>
        </div>

        <!-- 歷史時序圖視角 -->
        <div id="history-view">
            <!-- 歷史觀測日期標題 -->
            <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 22px; background: rgba(26, 26, 26, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 5px;">
                <span style="font-size: 15px; color: #BBB; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    歷史觀測日期
                </span>
                <span id="history-display-date" style="font-size: 18px; color: #00E5FF; font-weight: 800; letter-spacing: 0.5px;">-</span>
            </div>

            <!-- 溫度 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">溫度 (°C)</h3>
                    <div class="chart-badges" id="badges-temp"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-temp"></canvas>
                </div>
            </div>

            <!-- 濕度 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">濕度 (%)</h3>
                    <div class="chart-badges" id="badges-humidity"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-humidity"></canvas>
                </div>
            </div>

            <!-- 風速 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">風速 (m/s)</h3>
                    <div class="chart-badges" id="badges-windspeed"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-wind-speed"></canvas>
                </div>
            </div>

            <!-- 風向 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">風向 (°)</h3>
                    <div class="chart-badges" id="badges-winddir"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-wind-dir"></canvas>
                </div>
            </div>

            <!-- 氣壓 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">大氣壓力 (hPa)</h3>
                    <div class="chart-badges" id="badges-pressure"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-pressure"></canvas>
                </div>
            </div>

            <!-- 降雨 -->
            <div class="chart-section">
                <div class="chart-header">
                    <h3 class="chart-title-main">降雨量 (mm)</h3>
                    <div class="chart-badges" id="badges-precip"></div>
                </div>
                <div class="history-card">
                    <canvas id="chart-precip"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入模組化 JS 檔案 -->
    <script src="js/gauges.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
